<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{width:1200px;height:630px;background:#1a1425;font-family:Georgia,serif;overflow:hidden;display:flex;align-items:center;justify-content:center}
.bg{position:absolute;inset:0;background:radial-gradient(ellipse at 30% 50%, rgba(91,77,224,0.35) 0%, transparent 60%), radial-gradient(ellipse at 80% 20%, rgba(29,158,117,0.2) 0%, transparent 50%)}
.content{position:relative;z-index:2;text-align:center;padding:0 80px}
.logo{font-size:18px;font-family:'DM Sans',sans-serif;letter-spacing:2px;text-transform:uppercase;color:rgba(255,255,255,.5);margin-bottom:32px}
.logo span{color:#7c6fef}
h1{font-size:72px;font-weight:400;line-height:1.05;letter-spacing:-2px;color:white;margin-bottom:24px}
h1 em{font-style:italic;color:#7c6fef}
.sub{font-size:22px;color:rgba(255,255,255,.6);font-family:'DM Sans',sans-serif;font-weight:300;line-height:1.5}
.dots{display:flex;gap:8px;justify-content:center;margin-top:36px}
.dot{width:8px;height:8px;border-radius:50%;background:#5dcaa5}
.dot:nth-child(2){background:#7c6fef}
.dot:nth-child(3){background:#c97a1a}
</style>
</head>
<body>
<div class="bg"></div>
<div class="content">
  <div class="logo">Table<span>Folk</span></div>
  <h1>Dinner parties<br>worth <em>remembering</em></h1>
  <div class="sub">Meet new people. Share exceptional meals.<br>Join the waitlist at tablefolk.club</div>
  <div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>
</div>
</body>
</html>
