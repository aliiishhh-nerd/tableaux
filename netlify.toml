[build]
  command = "npm run build"
  publish = "build"

# SPA routing — all paths serve index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# ── Service Worker — must never be cached by the browser or CDN ──────────────
# If the SW is cached, users won't get updates on new deploys
[[headers]]
  for = "/service-worker.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"
    Expires = "0"

# ── Manifest — short cache is fine ───────────────────────────────────────────
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# ── Static assets — long cache (CRA hashes filenames) ────────────────────────
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# ── Icons — long cache ────────────────────────────────────────────────────────
[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
